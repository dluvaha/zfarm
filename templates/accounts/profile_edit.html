{% extends 'base.html' %}
{% block title %}Edit Profile{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-6"><h1 class="text-2xl font-bold text-gray-900">Edit Profile</h1></div>
    <div class="card">
        <form method="post" enctype="multipart/form-data" class="space-y-4">
            {% csrf_token %}
            {% for field in form %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<p class="mt-1 text-sm text-red-600">{% for e in field.errors %}{{ e }}{% endfor %}</p>{% endif %}
            </div>
            {% endfor %}
            <div class="flex gap-3 pt-4">
                <button type="submit" class="bg-primary-600 hover:bg-primary-700 text-white font-medium py-2.5 px-5 rounded-lg inline-flex items-center gap-2">Save Changes</button>
                <a href="{% url 'accounts:profile' %}" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2.5 px-5 rounded-lg inline-flex items-center gap-2">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
